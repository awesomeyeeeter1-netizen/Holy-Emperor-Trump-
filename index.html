<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1005 Images</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      grid-auto-rows: 100px;
    }
    img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<script>
  const src = "410-4103748_free-png-donald-trump-png-images-transparent-png.png";

  const template = document.createElement("img");
  template.src = src;

  const fragment = document.createDocumentFragment();

  for (let i = 0; i < 1005; i++) {
    const img = template.cloneNode();
    fragment.appendChild(img);
  }

  document.body.appendChild(fragment);
</script>

</body>
</html>
