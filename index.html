<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emperor Of The United States</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      grid-auto-rows: 100px;
    }
    img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<script>
  // IMPORTANT: keep ONE full base64 string and reuse it (don’t truncate it)
  const base64 = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/...REPLACE_WITH_YOUR_FULL_STRING...";

  // Create ONE image, then clone it (much faster + avoids crashes)
  const template = document.createElement("img");
  template.src = base64;

  const fragment = document.createDocumentFragment();

  for (let i = 0; i < 1000; i++) {
    const img = template.cloneNode();
    fragment.appendChild(img);
  }

  document.body.appendChild(fragment);
</script>

</body>
</html>
