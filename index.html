<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>trump</title>

  <style>
    body {
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, 100px);
      grid-auto-rows: 100px;
    }

    img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<!-- TEST IMAGE -->
<img src="trump.png" width="200">

<script>
  const src = "trump.png";

  const fragment = document.createDocumentFragment();

  for (let i = 0; i < 1003; i++) {
    const img = document.createElement("img");
    img.src = src;
    fragment.appendChild(img);
  }

  document.body.appendChild(fragment);
</script>

</body>
</html>
